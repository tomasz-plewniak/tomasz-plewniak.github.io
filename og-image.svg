<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="90%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
