  <!-- Subtitle -->
  <text x="80" y="356" font-family="'Plus Jakarta Sans','Segoe UI',Helvetica,Arial,sans-serif" font-size="34" font-weight="500" fill="#a1a1aa">C# &#183; .NET &#183; Azure &#183; Cloud Backend</text>

